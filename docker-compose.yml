services:
  # ─── Next.js App ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb_uc_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST:-10.1.102.74}
      DB_PORT: ${DB_PORT:-1521}
      DB_SERVICE: ${DB_SERVICE:-resdb}
      DB_USER: ${DB_USER:-APP}
      DB_PASSWORD: ${DB_PASSWORD:-}
    networks:
      - bb_network

networks:
  bb_network:
    driver: bridge
